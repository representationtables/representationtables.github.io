<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Citation.js Demo</title>

  <!-- Load Citation.js -->
  <script src="https://cdn.jsdelivr.net/npm/citation-js"></script>

  <style>
    body { font-family: Arial; margin: 40px; }
    .citation { color: blue; }
  </style>
</head>
<body>

<h2>Example Text</h2>

<p>
  This is a statement supported by research
  <span id="cite1" class="citation"></span>.
</p>

<h2>References</h2>
<div id="bibliography"></div>

<script>
// Your BibTeX data (can also be loaded from a file)
const bibtex = `
@article{smith2020,
  author = {Smith, John},
  title = {An Example Article},
  journal = {Journal of Examples},
  year = {2020}
}

@book{doe2021,
  author = {Doe, Jane},
  title = {A Great Book},
  year = {2021},
  publisher = {Fictional Press}
}
`;

// Create citation object
const cite = new Cite(bibtex);

// 👉 1. Insert inline citation
document.getElementById("cite1").innerHTML =
  cite.format('citation', {
    format: 'html',
    template: 'apa'
  });

// 👉 2. Generate bibliography
document.getElementById("bibliography").innerHTML =
  cite.format('bibliography', {
    format: 'html',
    template: 'apa'
  });

</script>

</body>
</html>

</body>
</html>
