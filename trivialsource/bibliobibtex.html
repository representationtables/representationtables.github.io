<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Citation.js with BibTeX File</title>

  <!-- Load Citation.js -->
  <script src="https://cdn.jsdelivr.net/npm/citation-js"></script>

  <style>
    body { font-family: Arial; margin: 40px; }
    .citation { color: blue; }
  </style>
</head>
<body>

<h2>Example Text</h2>

<p>
  This is a statement supported by research
  <span id="cite1" class="citation"></span>.
</p>

<h2>References</h2>
<div id="bibliography"></div>

<script>
const Cite = window.Cite;

// Load external BibTeX file
fetch('/representationtables.github.io/trivialsource/biblio.bib')
  .then(response => response.text())
  .then(bibtex => {

    // Parse BibTeX
    const cite = new Cite(bibtex);

    // 👉 Inline citation (ONLY smith2020)
    const selected = cite.get().filter(entry => entry.id === "smith2020");
    const citeOne = new Cite(selected);

    document.getElementById("cite1").innerHTML =
      citeOne.format('citation', {
        format: 'html',
        template: 'apa'
      });

    // 👉 Full bibliography (ALL entries)
    document.getElementById("bibliography").innerHTML =
      cite.format('bibliography', {
        format: 'html',
        template: 'apa'
      });

  })
  .catch(err => console.error("Error loading .bib file:", err));
</script>

</body>
</html>
